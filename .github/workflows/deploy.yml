name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests and Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Create environment files for CI
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.model.ts << 'ENVEOF'
          export interface Environment {
            production: boolean;
            firebase?: {
              projectId: string;
              appId: string;
              storageBucket: string;
              apiKey: string;
              authDomain: string;
              messagingSenderId: string;
            };
            cloudinaryConfig?: {
              cloud_name: string;
              upload_preset: string;
            };
          }
          ENVEOF

          cat > src/environments/environment.ts << 'ENVEOF'
          import { Environment } from './environment.model';
          export const environment: Environment = {
            production: false,
            cloudinaryConfig: {
              cloud_name: 'dfurubiqj',
              upload_preset: 'ml_default'
            }
          };
          ENVEOF

          cat > src/environments/environment.prod.ts << 'ENVEOF'
          import { Environment } from './environment.model';
          export const environment: Environment = {
            production: true,
            firebase: {
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}'
            },
            cloudinaryConfig: {
              cloud_name: 'dfurubiqj',
              upload_preset: 'ml_default'
            }
          };
          ENVEOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

      - name: Run tests
        run: pnpm test --watch=false

  build-and-deploy:
    name: Build and Deploy to Firebase
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Validate required secrets
        run: |
          [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ] && echo "❌ Missing FIREBASE_PROJECT_ID" && exit 1
          [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ] && echo "❌ Missing FIREBASE_SERVICE_ACCOUNT" && exit 1
          echo "✅ All required secrets are present"

      - name: Create environment files for deployment
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.model.ts << 'ENVEOF'
          export interface Environment {
            production: boolean;
            firebase?: {
              projectId: string;
              appId: string;
              storageBucket: string;
              apiKey: string;
              authDomain: string;
              messagingSenderId: string;
            };
            cloudinaryConfig?: {
              cloud_name: string;
              upload_preset: string;
            };
          }
          ENVEOF

          cat > src/environments/environment.ts << 'ENVEOF'
          import { Environment } from './environment.model';
          export const environment: Environment = {
            production: false,
            cloudinaryConfig: {
              cloud_name: 'dfurubiqj',
              upload_preset: 'ml_default'
            }
          };
          ENVEOF

          cat > src/environments/environment.prod.ts << 'ENVEOF'
          import { Environment } from './environment.model';
          export const environment: Environment = {
            production: true,
            firebase: {
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}'
            },
            cloudinaryConfig: {
              cloud_name: 'dfurubiqj',
              upload_preset: 'ml_default'
            }
          };
          ENVEOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Display build output
        run: |
          echo "📦 Build completed successfully"
          ls -lh dist/pwa-angular21/ 2>/dev/null | head -20 || echo "Build output not found"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
